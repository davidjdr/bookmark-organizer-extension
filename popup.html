<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="launcher">
    <div class="header">
      <h1>Bookmark Organizer</h1>
      <button id="settings-btn" class="icon-btn" title="Configuracion">&#9881;</button>
    </div>

    <div class="launcher-grid">
      <button class="launcher-btn" data-page="organize.html?mode=sort">
        <span class="launcher-icon">&#8645;</span>
        <span class="launcher-label">Ordenar en sitio</span>
        <span class="launcher-desc">Agrupa por tipo sin crear subcarpetas</span>
      </button>
      <button class="launcher-btn" data-page="organize.html?mode=group">
        <span class="launcher-icon">&#128193;</span>
        <span class="launcher-label">Agrupar en subcarpetas</span>
        <span class="launcher-desc">Crea subcarpetas por tipo</span>
      </button>
      <button class="launcher-btn" data-page="browse.html">
        <span class="launcher-icon">&#128197;</span>
        <span class="launcher-label">Explorar por fecha</span>
        <span class="launcher-desc">Ver marcadores ordenados por fecha</span>
      </button>
      <button class="launcher-btn" data-page="verify.html">
        <span class="launcher-icon">&#128269;</span>
        <span class="launcher-label">Verificar enlaces</span>
        <span class="launcher-desc">Detectar rotos y redirecciones</span>
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
